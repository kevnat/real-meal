<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support – Real Meal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 580px;
      margin: 48px auto;
      padding: 0 24px 64px;
      color: #222;
      line-height: 1.6;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 0.95rem; margin-top: 0 }
    .contact-direct {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 16px 20px;
      margin: 28px 0;
      font-size: 0.95rem;
    }
    .contact-direct a { color: #222; font-weight: 500; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 4px;
      margin-top: 20px;
      color: #444;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #222;
      background: #fff;
    }
    textarea { resize: vertical; min-height: 120px; }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #888;
    }
    button {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
    }
    button:hover { background: #444; }
    .note { font-size: 0.8rem; color: #888; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Real Meal Support</h1>
  <p class="subtitle">We typically respond within 1–2 business days.</p>

  <div class="contact-direct">
    Prefer email? Reach us directly at <a href="mailto:kevin.max.nathan@gmail.com">kevin.max.nathan@gmail.com</a>
  </div>

  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <label for="email">Your email</label>
    <input type="email" id="email" name="email" required placeholder="you@example.com">

    <label for="subject">Topic</label>
    <select id="subject" name="subject">
      <option value="bug">Bug report</option>
      <option value="account">Account or billing</option>
      <option value="data">Data deletion request</option>
      <option value="other">Other</option>
    </select>

    <label for="message">Message</label>
    <textarea id="message" name="message" required placeholder="Describe your issue or question…"></textarea>

    <button type="submit">Send message</button>
    <p class="note">Your message will be sent to kevin.max.nathan@gmail.com.</p>
  </form>
</body>
</html>
